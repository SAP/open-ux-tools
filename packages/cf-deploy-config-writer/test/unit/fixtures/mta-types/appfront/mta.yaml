_schema-version: 3.3.0
ID: captestproject
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: captestproject-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: captestproject-auth

  - name: captestproject-app-content
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
    requires:
      - name: captestproject-auth
      - name: srv-api
      - name: captestproject-app-front
        parameters:
          content-target: true
    parameters:
      config:
        destinations:
          - name: srv-api
            url: ~{srv-api/srv-url}
            forwardAuthToken: true

resources:
  - name: captestproject-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      service-name: captestproject-xsuaa-service
      path: ./xs-security.json
  - name: captestproject-app-front
    type: org.cloudfoundry.managed-service
    parameters:
      service: app-front
      service-plan: developer

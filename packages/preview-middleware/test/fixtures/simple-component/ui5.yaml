specVersion: '5.0'
metadata:
    name: test-project
type: component
server:
    customMiddleware:
        - name: preview-middleware
          afterMiddleware: compression
          configuration:
              flp:
                path: /my/custom/path/preview.html
                libs: true
              test:
                - framework: QUnit
                - framework: OPA5
                - framework: Testsuite
              debug: true
        - name: ui5-proxy-middleware
          afterMiddleware: preview-middleware
          configuration:
              ui5:
                  - path: /resources
                    url: https://ui5.sap.com
                  - path: /test-resources
                    url: https://ui5.sap.com
              version: 1.136 # default for local dev; replaced per-version by component.spec.ts
        - name: sap-fe-mockserver
          beforeMiddleware: csp
          configuration:
              mountPath: /
              annotations:
                  - localPath: ./src/localService/annotations.xml
                    urlPath: /sap/opu/odata/IWFND/CATALOGSERVICE;v=2/Annotations*
              services:
                  - urlPath: /sap/opu/odata/myservice
                    metadataPath: ./src/localService/metadata.xml
                    mockdataPath: ./src/localService/data
                    generateMockData: true
---
specVersion: '3.0'
metadata:
    name: preview-middleware
kind: extension
type: server-middleware
middleware:
    path: ../../../dist/ui5/middleware.js
---
specVersion: '3.0'
metadata:
    name: ui5-proxy-middleware
kind: extension
type: server-middleware
middleware:
    path: ../../../../ui5-proxy-middleware/dist/ui5/middleware.js

specVersion: '1.0'
metadata:
  name: test-app
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: http://example.sap.corp:50000
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
          version:
